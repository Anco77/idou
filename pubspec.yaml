name: idou
description: 智能拼豆库存管理与AI图纸生成工具
publish_to: 'none'
version: 1.1.1+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 数据库
  drift: ^2.28.0
  sqlite3_flutter_libs: ^0.5.27
  path_provider: ^2.1.0
  path: ^1.9.0
  
  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # 路由
  go_router: ^14.6.0
  
  # 图像处理
  image: ^4.5.0
  image_picker: ^1.1.2
  
  # UI工具
  intl: ^0.19.0
  share_plus: ^10.1.0
  
  # 工具
  uuid: ^4.5.1
  collection: ^1.18.0

  # 更新管理
  in_app_update: ^4.2.0
  package_info_plus: ^8.1.0
  http: ^1.2.0
  url_launcher: ^6.3.0
  open_filex: ^4.5.0
  connectivity_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  
  # 代码生成
  drift_dev: ^2.28.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.6.1
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/
